# Pipeline to convert Ozon campaigns from Avro STG to Iceberg ODS
# Source: Yandex S3 s3://bi-dev/warehouse/stg__ozon.db/campaigns/ (Avro)
# Target: Yandex S3 s3://bi-dev/warehouse/ods__ozon.db/campaigns/ (Iceberg)

connections:
  - sourceName: "stg_avro"
    connection: "minioAvro"
    configLocation: "configs/connections/local_stg_avro.yaml"
  - sourceName: "ods_iceberg"
    connection: "minioIceberg"
    configLocation: "configs/connections/yandex_s3_iceberg_ods_hadoop.yaml"

source:
  - sourceName: "stg_avro"
    objectName: "stg_campaigns"
    initMode: "instantly"
    sourceFileSystem:
      tableName: "warehouse/stg__ozon.db/campaigns"
      partitionBy:
        - "partition"
      where: "partition = '${partition}'"

target:
  - fileSystem:
    connection: "ods_iceberg"
    source: "stg_campaigns"
    tableName: "ods__ozon.campaigns"
    targetFile: "ods__ozon.campaigns"
    mode: "overwriteTable"
