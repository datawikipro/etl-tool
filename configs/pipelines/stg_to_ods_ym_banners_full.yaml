# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ym.db/banners/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ym.db/banners/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_banners
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ym.db/banners
target:
- fileSystem:
    connection: ods_iceberg
    source: banners_deduplicated
    tableName: ods__ym.banners
    targetFile: ods__ym.db/banners
    mode: overwriteTable
    mergeKeys:
    - campaignid
    - warehouseid
    - offerid
    - stocktype
transformations:
- objectName: banners_deduplicated
  deduplicate:
    sourceTable: stg_banners
    uniqueKey:
    - campaignid
    - warehouseid
    - offerid
    - stocktype
    deduplicationKey:
    - partition desc
    - count desc
