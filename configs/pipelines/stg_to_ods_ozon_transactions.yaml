# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ozon.db/transactions/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ozon.db/transactions/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_transactions
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ozon.db/transactions
target:
- fileSystem:
    connection: ods_iceberg
    source: transactions_deduplicated
    tableName: ods__ozon.transactions
    targetFile: ods__ozon.db/transactions
    mode: mergeDelta
    mergeKeys:
    - id
transformations:
- objectName: transactions_deduplicated
  deduplicate:
    sourceTable: stg_transactions
    uniqueKey:
    - id
    deduplicationKey:
    - partition desc
    - operationdate desc
