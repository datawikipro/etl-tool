# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/paid_storage/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/paid_storage/ (Iceberg, Hadoop Catalog)
# Schema fields: date, logisticsWarehouseName, nmId, barcode, subject, brand,
#                vendorCode, quantity, tariffFixDate, tariffLowerDate, warehousePrice, sum

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_paid_storage
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/paid_storage
target:
- fileSystem:
    connection: ods_iceberg
    source: stg_paid_storage
    tableName: ods__wb.paid_storage
    targetFile: ods__wb.db/paid_storage
    mode: overwriteTable
