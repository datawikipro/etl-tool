# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ym.db/campaigns/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ym.db/campaigns/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_campaigns
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ym.db/campaigns
target:
- fileSystem:
    connection: ods_iceberg
    source: campaigns_deduplicated
    tableName: ods__ym.campaigns
    targetFile: ods__ym.db/campaigns
    mode: overwriteTable
    mergeKeys:
    - id
transformations:
- objectName: campaigns_deduplicated
  deduplicate:
    sourceTable: stg_campaigns
    uniqueKey:
    - id
    deduplicationKey:
    - partition desc
    - id desc
