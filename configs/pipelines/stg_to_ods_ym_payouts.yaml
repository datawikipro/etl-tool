# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ym.db/payouts/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ym.db/payouts/ (Iceberg, Hadoop Catalog)
# Schema fields: campaignId, id, date, amount, status
# Transformation: camelCase -> lowercase (Yandex Market convention)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_payouts
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ym.db/payouts
transformations:
- objectName: payouts_transformed
  sparkSql:
    sql: "SELECT\n  campaignId as campaignid,\n  id,\n  date,\n  amount,\n  status,\n\
      \  CAST(partition as string) as partition\nFROM stg_payouts\n"
- objectName: payouts_deduplicated
  deduplicate:
    sourceTable: payouts_transformed
    uniqueKey:
    - campaignid
    - id
    deduplicationKey:
    - partition desc
    - date desc
target:
- fileSystem:
    connection: ods_iceberg
    source: payouts_deduplicated
    tableName: ods__ym.payouts
    targetFile: ods__ym.db/payouts
    mode: mergeDelta
    mergeKeys:
    - campaignid
    - id
