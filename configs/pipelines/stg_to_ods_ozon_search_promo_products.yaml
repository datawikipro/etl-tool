# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ozon.db/search_promo_products/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ozon.db/search_promo_products/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_search_promo_products
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ozon.db/search_promo_products
target:
- fileSystem:
    connection: ods_iceberg
    source: search_promo_products_deduplicated
    tableName: ods__ozon.search_promo_products
    targetFile: ods__ozon.db/search_promo_products
    mode: mergeDelta
    mergeKeys:
    - sku
transformations:
- objectName: search_promo_products_deduplicated
  deduplicate:
    sourceTable: stg_search_promo_products
    uniqueKey:
    - sku
    deduplicationKey:
    - partition desc
