# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ozon.db/campaign_products/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ozon.db/campaign_products/ (Iceberg)
# Содержит: CPC-товары кампаний с bid, targetCir, topPosition

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_campaign_products
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ozon.db/campaign_products
    partitionBy:
    - partition
    where: "partition = '${partition}'"
target:
- fileSystem:
    connection: ods_iceberg
    source: campaign_products_deduplicated
    tableName: ods__ozon.campaign_products
    targetFile: ods__ozon.db/campaign_products
    mode: mergeDelta
    mergeKeys:
    - campaignid
    - sku
transformations:
- objectName: campaign_products_deduplicated
  deduplicate:
    sourceTable: stg_campaign_products
    uniqueKey:
    - campaignid
    - sku
    deduplicationKey:
    - partition desc
