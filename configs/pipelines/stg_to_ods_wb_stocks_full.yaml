# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/stocks/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/stocks/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_stocks
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/stocks
target:
- fileSystem:
    connection: ods_iceberg
    source: stocks_deduplicated
    tableName: ods__wb.stocks
    targetFile: ods__wb.db/stocks
    mode: overwriteTable
    mergeKeys:
    - nmid
    - barcode
    - warehousename
transformations:
- objectName: stocks_deduplicated
  deduplicate:
    sourceTable: stg_stocks
    uniqueKey:
    - nmid
    - barcode
    - warehousename
    deduplicationKey:
    - partition desc
    - lastchangedate desc
