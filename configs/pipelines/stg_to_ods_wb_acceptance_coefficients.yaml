# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/acceptance_coefficients/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/acceptance_coefficients/ (Iceberg, Hadoop Catalog)
# Schema fields: date, coefficient, warehouseId, warehouseName, allowUnload

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_acceptance_coefficients
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/acceptance_coefficients
target:
- fileSystem:
    connection: ods_iceberg
    source: stg_acceptance_coefficients
    tableName: ods__wb.acceptance_coefficients
    targetFile: ods__wb.db/acceptance_coefficients
    mode: overwriteTable
