# ── Spark defaults for local Docker dev ─────────────────────
# Applied to both master/worker (cluster profile) and
# the embedded local-mode Spark inside etl-tool.

# Use all available cores when running in local mode
spark.master                    local[*]

# Lower shuffle partitions for dev (default 200 is too many)
spark.sql.shuffle.partitions    8

# Reduce Spark UI overhead
spark.ui.enabled                true
spark.ui.port                   4040

# Serialisation
spark.serializer                org.apache.spark.serializer.KryoSerializer

# Logging: suppress everything below WARN
spark.eventLog.enabled          false
