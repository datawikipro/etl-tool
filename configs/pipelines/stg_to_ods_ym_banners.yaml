# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ym.db/banners/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ym.db/banners/ (Iceberg, Hive Metastore)
# Fix: Added partitionBy/where to read only current day's partition.
#      Previously all 909 files (110 dates) were read, causing Trino MERGE
#      to exceed the 100 open writers limit.

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_banners
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ym.db/banners
    partitionBy:
    - partition
    where: "partition = '${partition}'"
transformations:
- objectName: banners_transformed
  sparkSql:
    sql: "SELECT \n  campaignId as campaignid,\n  warehouseId as warehouseid,\n  offerId\
      \ as offerid,\n  stockType as stocktype,\n  count,\n  CAST(partition as string)\
      \ as partition\nFROM stg_banners\n"
- objectName: banners_deduplicated
  deduplicate:
    sourceTable: banners_transformed
    uniqueKey:
    - campaignid
    - warehouseid
    - offerid
    - stocktype
    deduplicationKey:
    - count desc
target:
- fileSystem:
    connection: ods_iceberg
    source: banners_deduplicated
    tableName: ods__ym.banners
    targetFile: ods__ym.db/banners
    mode: mergeDelta
    mergeKeys:
    - campaignid
    - warehouseid
    - offerid
    - stocktype
