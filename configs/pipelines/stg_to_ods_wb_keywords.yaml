# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/keywords/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/keywords/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_keywords
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/keywords
    partitionBy:
    - partition
    where: "partition = '${partition}'"
target:
- fileSystem:
    connection: ods_iceberg
    source: keywords_deduplicated
    tableName: ods__wb.keywords
    targetFile: ods__wb.db/keywords
    mode: mergeDelta
    mergeKeys:
    - campaignid
    - keyword
transformations:
- objectName: keywords_deduplicated
  deduplicate:
    sourceTable: stg_keywords
    uniqueKey:
    - campaignid
    - keyword
    deduplicationKey:
    - partition desc
    - campaignid desc
