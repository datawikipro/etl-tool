# Connection config для чтения Avro-файлов из S3 (stg-слой)
# Путь к файлу: /configs/connections/minio_stg_avro.yaml

minioHost:
  - hostUrl: "https://nss1s3-enc.s3.ru"
    hostName: "nss1s3-enc.s3.ru"
    hostPort: 443

accessKey: "${S3_ACCESS_KEY}"
secretKey: "${S3_SECRET_KEY}"
bucket: "bi-dev"              # бакет с stg-данными

pathStyleAccess: true
establishTimeout: "15000"
connectionTimeout: "60000"
