# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ozon.db/transactions/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ozon.db/transactions/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_transactions
  initMode: instantly
  skipIfEmpty: true
  sourceFileSystem:
    tableName: warehouse/stg__ozon.db/transactions
    partitionBy:
    - partition
target:
- fileSystem:
    connection: ods_iceberg
    source: transactions_deduplicated
    tableName: ods__ozon.transactions
    targetFile: ods__ozon.db/transactions
    mode: mergeDelta
    mergeKeys:
    - id
transformations:
- objectName: transactions_extracted
  extractSchema:
    tableName: stg_transactions
    jsonColumn: rawJson
    jsonResultColumn: rawJson_struct
    baseSchema: ozon_transactions_rawjson
    mergeSchema: true
    loadMode: batch
- objectName: transactions_transformed
  sparkSql:
    sql: "SELECT id, operationType, operationDate, CAST(partition as string) as partition, rawJson_struct.* FROM transactions_extracted"
- objectName: transactions_deduplicated
  deduplicate:
    sourceTable: transactions_transformed
    uniqueKey:
    - id
    deduplicationKey:
    - partition desc
    - operationdate desc
