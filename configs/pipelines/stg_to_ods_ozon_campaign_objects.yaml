# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ozon.db/campaign-objects/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ozon.db/campaign_objects/ (Iceberg, Hive Metastore)

connections:
  - sourceName: "stg_avro"
    connection: "minioAvro"
    configLocation: "configs/connections/local_stg_avro.yaml"
  - sourceName: "ods_iceberg"
    connection: "minioIceberg"
    configLocation: "configs/connections/yandex_s3_iceberg_ods_hadoop.yaml"

source:
  - sourceName: "stg_avro"
    objectName: "stg_campaign_objects"
    initMode: "instantly"
    sourceFileSystem:
      tableName: "warehouse/stg__ozon.db/campaign-objects"
      partitionBy:
        - "partition"
      where: "partition = '${partition}'"

target:
  - fileSystem:
      connection: "ods_iceberg"
      source: "stg_campaign_objects"
      tableName: "ods__ozon.campaign_objects"
      targetFile: "ods__ozon.campaign_objects"
      mode: "overwritePartition"
