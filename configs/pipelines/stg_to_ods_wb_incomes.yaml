# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/incomes/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/incomes/ (Iceberg, Hadoop Catalog)
# Schema fields: incomeId, number, date, lastChangeDate, supplierArticle, techSize,
#                barcode, quantity, totalPrice, dateClose, warehouseName, nmId, status

connections:
  - sourceName: "stg_avro"
    connection: "minioAvro"
    configLocation: "configs/connections/local_stg_avro.yaml"
  - sourceName: "ods_iceberg"
    connection: "minioIceberg"
    configLocation: "configs/connections/yandex_s3_iceberg_ods_hadoop.yaml"

source:
  - sourceName: "stg_avro"
    objectName: "stg_incomes"
    initMode: "instantly"
    sourceFileSystem:
      tableName: "warehouse/stg__wb.db/incomes"
      partitionBy:
        - "partition"
      where: "partition = '${partition}'"

target:
  - fileSystem:
      connection: "ods_iceberg"
      source: "stg_incomes"
      tableName: "ods__wb.incomes"
      targetFile: "ods__wb.db/incomes"
      mode: "overwriteTable"
