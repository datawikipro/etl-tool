# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/supplies/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/supplies/ (Iceberg, Hadoop Catalog)
# Schema fields: supplyId, supplyName, created, closedAt, scanAt, doneAt,
#                status, cargoType, nmId, barcode, quantity

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_supplies
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/supplies
target:
- fileSystem:
    connection: ods_iceberg
    source: supplies_deduplicated
    tableName: ods__wb.supplies
    targetFile: ods__wb.db/supplies
    mode: mergeDelta
    mergeKeys:
    - supplyid
    - nmid
    - barcode
transformations:
- objectName: supplies_deduplicated
  deduplicate:
    sourceTable: stg_supplies
    uniqueKey:
    - supplyid
    - nmid
    - barcode
    deduplicationKey:
    - partition desc
