# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/campaign-objects/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/campaign_objects/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_campaign_objects
  initMode: instantly
  skipIfEmpty: true
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/campaign-objects
target:
- fileSystem:
    connection: ods_iceberg
    source: campaign_objects_deduplicated
    tableName: ods__wb.campaign_objects
    targetFile: ods__wb.db/campaign_objects
    mode: mergeDelta
    mergeKeys:
    - campaignid
    - id
transformations:
- objectName: campaign_objects_deduplicated
  deduplicate:
    sourceTable: stg_campaign_objects
    uniqueKey:
    - campaignid
    - id
    deduplicationKey:
    - partition desc
    - id desc
