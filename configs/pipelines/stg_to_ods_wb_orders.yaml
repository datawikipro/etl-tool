# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/orders/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/orders/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_orders
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/orders
    partitionBy:
    - partition
    where: "partition = '${partition}'"
target:
- fileSystem:
    connection: ods_iceberg
    source: orders_deduplicated
    tableName: ods__wb.orders
    targetFile: ods__wb.db/orders
    mode: mergeDelta
    mergeKeys:
    - srid
transformations:
- objectName: orders_deduplicated
  deduplicate:
    sourceTable: stg_orders
    uniqueKey:
    - srid
    deduplicationKey:
    - partition desc
    - lastchangedate desc
