# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ozon.db/products/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ozon.db/products/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_products
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ozon.db/products
    partitionBy:
    - partition
    where: "partition = '${partition}'"
target:
- fileSystem:
    connection: ods_iceberg
    source: products_deduplicated
    tableName: ods__ozon.products
    targetFile: ods__ozon.db/products
    mode: mergeDelta
    mergeKeys:
    - productid
    - offerid
transformations:
- objectName: products_extracted
  extractSchema:
    tableName: stg_products
    jsonColumn: rawJson
    jsonResultColumn: rawJson_struct
    baseSchema: ozon_products_rawjson
    mergeSchema: true
    loadMode: batch
- objectName: products_transformed
  sparkSql:
    sql: "SELECT productId, offerId, CAST(partition as string) as partition, rawJson_struct.* FROM products_extracted"
- objectName: products_deduplicated
  deduplicate:
    sourceTable: products_transformed
    uniqueKey:
    - productid
    - offerid
    deduplicationKey:
    - partition desc
    - productid desc
