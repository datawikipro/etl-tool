# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ozon.db/returns/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ozon.db/returns/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_returns
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ozon.db/returns
target:
- fileSystem:
    connection: ods_iceberg
    source: returns_deduplicated
    tableName: ods__ozon.returns
    targetFile: ods__ozon.db/returns
    mode: mergeDelta
    mergeKeys:
    - id
transformations:
- objectName: returns_extracted
  extractSchema:
    tableName: stg_returns
    jsonColumn: rawJson
    jsonResultColumn: rawJson_struct
    baseSchema: /app/configs/pipelines/ozon_returns_rawjson
    mergeSchema: true
    loadMode: batch
- objectName: returns_transformed
  sparkSql:
    sql: "SELECT id, postingNumber as postingnumber, status, CAST(partition as string) as partition FROM returns_extracted"
- objectName: returns_deduplicated
  deduplicate:
    sourceTable: returns_transformed
    uniqueKey:
    - id
    deduplicationKey:
    - partition desc
    - id desc
