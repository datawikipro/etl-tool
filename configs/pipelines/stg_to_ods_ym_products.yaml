# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ym.db/products/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ym.db/products/ (Iceberg, Hadoop Catalog)
# Schema fields: businessId, offerId, name, category, vendor, vendorCode, barcode, marketSku, mappingType, availability
# Note: партиционирован по business_id, не campaign_id
# Transformation: camelCase -> lowercase (Yandex Market convention)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_products
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ym.db/products
    partitionBy:
    - partition
    where: "partition = '${partition}'"
transformations:
- objectName: products_transformed
  sparkSql:
    sql: "SELECT\n  businessId as businessid,\n  offerId as offerid,\n  name,\n  category,\n\
      \  vendor,\n  vendorCode as vendorcode,\n  barcode,\n  marketSku as marketsku,\n\
      \  mappingType as mappingtype,\n  availability,\n  CAST(partition as string)\
      \ as partition\nFROM stg_products\n"
- objectName: products_deduplicated
  deduplicate:
    sourceTable: products_transformed
    uniqueKey:
    - businessid
    - offerid
    deduplicationKey:
    - partition desc
target:
- fileSystem:
    connection: ods_iceberg
    source: products_deduplicated
    tableName: ods__ym.products
    targetFile: ods__ym.db/products
    mode: mergeDelta
    mergeKeys:
    - businessid
    - offerid
