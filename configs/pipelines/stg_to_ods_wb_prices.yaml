# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/prices/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/prices/ (Iceberg, Hadoop Catalog)
# Schema fields: nmId, price, discount, promoCode
# Note: prices.avsc does not declare a 'partition' field — partition is appended
#       dynamically by the loader at write time (same pattern as stocks).

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_prices
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/prices
    partitionBy:
    - partition
    where: "partition = '${partition}'"
target:
- fileSystem:
    connection: ods_iceberg
    source: prices_deduplicated
    tableName: ods__wb.prices
    targetFile: ods__wb.db/prices
    mode: mergeDelta
    mergeKeys:
    - nmid
transformations:
- objectName: prices_deduplicated
  deduplicate:
    sourceTable: stg_prices
    uniqueKey:
    - nmid
    deduplicationKey:
    - partition desc
    - nmid desc
