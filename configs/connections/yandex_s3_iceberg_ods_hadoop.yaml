# Connection config for writing Iceberg ODS via Hadoop catalog (no Hive Metastore needed)
# Used for local Docker runs when Hive Metastore is not accessible

minioHost:
  - hostUrl: null
    hostName: "${S3_HOST:nss1s3-enc.s3.ru}"
    hostPort: ${S3_PORT:443}

accessKey: "${S3_ACCESS_KEY:VXS717151INAVRCUAO02}"
secretKey: "${S3_SECRET_KEY:LzP7z4z3AW7vSfi09ukFmH69s_qO47_z723aA1Ar}"
bucket: "${S3_BUCKET:bi-dev}"

# Iceberg catalog settings — Hadoop catalog (no HMS required)
warehouse: "${S3_WAREHOUSE:s3a://bi-dev/warehouse}"
hiveMetastoreUri: "${HIVE_METASTORE_URI:}"
catalog: "${ICEBERG_CATALOG:iceberg}"
catalogType: "${ICEBERG_CATALOG_TYPE:hadoop}"
region: "${S3_REGION:us-east-1}"
idmapSchema: "idmap.db"

pathStyleAccess: ${S3_PATH_STYLE_ACCESS:true}
establishTimeout: "${S3_ESTABLISH_TIMEOUT:15000}"
connectionTimeout: "${S3_CONNECTION_TIMEOUT:60000}"
sslEnabled: ${S3_SSL_ENABLED:true}

register:
  type: "trino-jdbc"
  url: "${TRINO_URL:jdbc:trino://trino.dev-kube.terminal.lft:443/iceberg?SSL=true&SSLVerification=NONE}"
  user: "${TRINO_USER:chernousov_a}"
