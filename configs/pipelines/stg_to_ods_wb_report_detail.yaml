# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/report-detail/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/report_detail/ (Iceberg, Hive Metastore)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_report_detail
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/report-detail
    partitionBy:
    - partition
    where: "partition = '${partition}'"
target:
- fileSystem:
    connection: ods_iceberg
    source: report_detail_deduplicated
    tableName: ods__wb.report_detail
    targetFile: ods__wb.db/report_detail
    mode: mergeDelta
    mergeKeys:
    - srid
transformations:
- objectName: report_detail_transformed
  sparkSql:
    sql: "SELECT\n  realizationreportId as realizationreportid,\n  dateFrom as datefrom,\n  dateTo as dateto,\n  createDt as createdt,\n  rrdId as rrdid,\n  giId as giid,\n  subjectName as subjectname,\n  nmId as nmid,\n  brandName as brandname,\n  saName as saname,\n  barcode,\n  docTypeName as doctypename,\n  quantity,\n  retailPrice as retailprice,\n  retailAmount as retailamount,\n  salePercent as salepercent,\n  commissionPercent as commissionpercent,\n  officeName as officename,\n  supplierOperName as supplieropername,\n  orderDt as orderdt,\n  saleDt as saledt,\n  shkId as shkid,\n  retailPriceWithdiscRub as retailpricewithdiscrub,\n  deliveryAmount as deliveryamount,\n  returnAmount as returnamount,\n  deliveryRub as deliveryrub,\n  giBoxTypeName as giboxtypename,\n  productDiscountForReport as productdiscountforreport,\n  supplierPromo as supplierpromo,\n  rid,\n  srid,\n  CAST(partition as string) as partition\nFROM stg_report_detail\n"
- objectName: report_detail_deduplicated
  deduplicate:
    sourceTable: report_detail_transformed
    uniqueKey:
    - srid
    deduplicationKey:
    - partition desc
    - srid desc
