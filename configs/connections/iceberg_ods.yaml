# Connection config для записи в Iceberg ODS-слой через Hive Metastore
# Путь к файлу: /configs/connections/iceberg_ods.yaml

minioHost:
  - hostUrl: null
    hostName: "nss1s3.ru"
    hostPort: 9000

accessKey: "${S3_ACCESS_KEY}"
secretKey: "${S3_SECRET_KEY}"
bucket: "bi-dev"

# Iceberg catalog settings
warehouse: "s3a://bi-dev/warehouse"
hiveMetastoreUri: "thrift://hive-metastore:9083"
catalog: "iceberg"

# S3 connection settings
pathStyleAccess: true
establishTimeout: "15000"
connectionTimeout: "60000"
sslEnabled: false
