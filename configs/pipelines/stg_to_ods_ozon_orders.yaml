# ETL-пайплайн: stg → ods (Avro → Iceberg)
# Пример: копирование таблицы ozon.orders из STG в ODS

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_orders
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ozon.db/orders
target:
- fileSystem:
    connection: ods_iceberg
    source: orders_deduplicated
    tableName: ods__ozon.orders
    targetFile: ods__ozon.db/orders
    mode: mergeDelta
    mergeKeys:
    - postingnumber
transformations:
- objectName: orders_extracted
  extractSchema:
    tableName: stg_orders
    jsonColumn: rawJson
    jsonResultColumn: rawJson_struct
    baseSchema: ozon_orders_rawjson
    mergeSchema: true
    loadMode: batch
- objectName: orders_transformed
  sparkSql:
    sql: "SELECT orderId, postingNumber, createdAt, type, CAST(partition as string) as partition, rawJson, rawJson_struct.* FROM orders_extracted"
- objectName: orders_deduplicated
  deduplicate:
    sourceTable: orders_transformed
    uniqueKey:
    - postingnumber
    deduplicationKey:
    - partition desc
    - createdat desc
