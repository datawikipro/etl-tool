# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/feedbacks/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/feedbacks/ (Iceberg, Hadoop Catalog)
# Schema fields: id, userName, text, pros, cons, createdDate, productValuation,
#                nmId, vendorCode, answerText, answerState

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_feedbacks
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/feedbacks
target:
- fileSystem:
    connection: ods_iceberg
    source: feedbacks_deduplicated
    tableName: ods__wb.feedbacks
    targetFile: ods__wb.db/feedbacks
    mode: mergeDelta
    mergeKeys:
    - id
transformations:
- objectName: feedbacks_deduplicated
  deduplicate:
    sourceTable: stg_feedbacks
    uniqueKey:
    - id
    deduplicationKey:
    - partition desc
