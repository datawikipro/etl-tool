# Paynet Iceberg connection via forwarded Hive Metastore and MinIO
minioHost:
  - hostUrl: null
    hostName: "127.0.0.1"
    hostPort: 9010

accessKey: "admin"
secretKey: "admin_password"
bucket: "bi-dev"

# Iceberg catalog settings
warehouse: "s3a://bi-dev/warehouse"
hiveMetastoreUri: "thrift://127.0.0.1:9089"
catalog: "iceberg"
region: "us-east-1"

pathStyleAccess: true
establishTimeout: "15000"
connectionTimeout: "60000"
sslEnabled: false
