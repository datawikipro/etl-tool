# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ym.db/adv_payments/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ym.db/adv_payments/ (Iceberg, Hadoop Catalog)
# Schema fields: campaignId, id, date, amount, status
# Transformation: camelCase -> lowercase (Yandex Market convention)

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_adv_payments
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__ym.db/adv_payments
transformations:
- objectName: adv_payments_transformed
  sparkSql:
    sql: "SELECT\n  campaignId as campaignid,\n  id,\n  date,\n  amount,\n  status,\n\
      \  partition\nFROM stg_adv_payments\n"
- objectName: adv_payments_deduplicated
  deduplicate:
    sourceTable: adv_payments_transformed
    uniqueKey:
    - campaignid
    - id
    deduplicationKey:
    - partition desc
    - date desc
target:
- fileSystem:
    connection: ods_iceberg
    source: adv_payments_deduplicated
    tableName: ods__ym.adv_payments
    targetFile: ods__ym.db/adv_payments
    mode: mergeDelta
    mergeKeys:
    - campaignid
    - id
