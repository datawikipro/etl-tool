# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__wb.db/sales_funnel/ (Avro)
# Target: s3://bi-dev/warehouse/ods__wb.db/sales_funnel/ (Iceberg, Hadoop Catalog)
# Schema fields: nmId, vendorCode, brandName, subjectName, openCardCount, addToCartCount,
#                addToCartPercent, cartToOrderPercent, buyoutsPercent, ordersCount,
#                ordersSumRub, buyoutsCount, buyoutsSumRub, cancelCount, cancelSumRub,
#                avgPriceRub, avgDiscountPercent

connections:
- sourceName: stg_avro
  connection: minioAvro
  configLocation: configs/connections/local_stg_avro.yaml
- sourceName: ods_iceberg
  connection: minioIceberg
  configLocation: configs/connections/yandex_s3_iceberg_ods_hadoop.yaml
source:
- sourceName: stg_avro
  objectName: stg_sales_funnel
  initMode: instantly
  sourceFileSystem:
    tableName: warehouse/stg__wb.db/sales_funnel
target:
- fileSystem:
    connection: ods_iceberg
    source: stg_sales_funnel
    tableName: ods__wb.sales_funnel
    targetFile: ods__wb.db/sales_funnel
    mode: overwriteTable
