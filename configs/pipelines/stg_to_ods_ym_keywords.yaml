# Pipeline: STG -> ODS (Avro -> Iceberg)
# Source: s3://bi-dev/warehouse/stg__ym.db/keywords/ (Avro)
# Target: s3://bi-dev/warehouse/ods__ym/keywords/ (Iceberg, Hive Metastore)

connections:
  - sourceName: "stg_avro"
    connection: "minioAvro"
    configLocation: "configs/connections/local_stg_avro.yaml"
  - sourceName: "ods_iceberg"
    connection: "minioIceberg"
    configLocation: "configs/connections/yandex_s3_iceberg_ods_hadoop.yaml"

source:
  - sourceName: "stg_avro"
    objectName: "stg_keywords"
    initMode: "instantly"
    sourceFileSystem:
      tableName: "warehouse/stg__ym.db/keywords"
      partitionBy:
        - "partition"
      where: "partition = '${partition}'"

transformations:
  - objectName: "keywords_transformed"
    sparkSql:
      sql: |
        SELECT 
          campaignId as campaignid,
          orderId as orderid,
          status,
          substatus,
          creationDate as creationdate,
          offerId as offerid,
          count,
          price,
          partition
        FROM stg_keywords

target:
  - fileSystem:
      connection: "ods_iceberg"
      source: "keywords_transformed"
      tableName: "ods__ym.keywords"
      targetFile: "ods__ym.keywords"
      mode: "overwriteTable"
